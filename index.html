
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YardLogic Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              outfit: ['Outfit', 'sans-serif'],
              space: ['Space Grotesk', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      @keyframes scanner-line {
        0% { top: 0; }
        100% { top: 100%; }
      }
      @keyframes status-pulse-blue {
        0%, 100% { background-color: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.2); }
        50% { background-color: rgba(59, 130, 246, 0.25); border-color: rgba(59, 130, 246, 0.4); }
      }
      @keyframes status-pulse-amber {
        0%, 100% { background-color: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2); }
        50% { background-color: rgba(245, 158, 11, 0.25); border-color: rgba(245, 158, 11, 0.4); }
      }
      @keyframes stale-pulse {
        0%, 100% { border-color: rgba(245, 158, 11, 0.3); box-shadow: 0 0 10px rgba(245, 158, 11, 0.05); }
        50% { border-color: rgba(245, 158, 11, 0.7); box-shadow: 0 0 25px rgba(245, 158, 11, 0.25); }
      }
      @keyframes status-pulse-green {
        0%, 100% { box-shadow: 0 0 0px rgba(16, 185, 129, 0); background-color: rgba(16, 185, 129, 0.1); }
        50% { box-shadow: 0 0 12px rgba(16, 185, 129, 0.3); background-color: rgba(16, 185, 129, 0.2); }
      }
      @keyframes status-pulse-red {
        0%, 100% { opacity: 1; background-color: rgba(239, 68, 68, 0.1); }
        50% { opacity: 0.8; background-color: rgba(239, 68, 68, 0.2); }
      }
      @keyframes soft-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes pulse-subtle {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.015); opacity: 0.95; }
      }
      @keyframes critical-pulse {
        0%, 100% { 
          box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); 
          border-color: rgba(239, 68, 68, 0.4);
          transform: scale(1);
        }
        50% { 
          box-shadow: 0 0 30px rgba(239, 68, 68, 0.5), 0 0 10px rgba(239, 68, 68, 0.2); 
          border-color: rgba(239, 68, 68, 0.8);
          transform: scale(1.01);
        }
      }
      @keyframes ready-pulse {
        0%, 100% { 
          box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); 
          border-color: rgba(16, 185, 129, 0.4);
          transform: scale(1);
        }
        50% { 
          box-shadow: 0 0 30px rgba(16, 185, 129, 0.6), 0 0 10px rgba(16, 185, 129, 0.3); 
          border-color: rgba(16, 185, 129, 0.9);
          transform: scale(1.02);
        }
      }
      @keyframes selected-fluid {
        0%, 100% { 
          box-shadow: 0 0 15px rgba(59, 130, 246, 0.2), inset 0 0 10px rgba(59, 130, 246, 0.05);
          border-color: #60a5fa;
          transform: scale(1.01);
        }
        50% { 
          box-shadow: 0 0 25px rgba(59, 130, 246, 0.5), inset 0 0 20px rgba(59, 130, 246, 0.1);
          border-color: #3b82f6;
          transform: scale(1.03);
        }
      }
      @keyframes form-glow {
        0%, 100% { box-shadow: 0 10px 40px -10px rgba(0,0,0,0.3), 0 0 20px rgba(59, 130, 246, 0.1); }
        50% { box-shadow: 0 15px 60px -15px rgba(0,0,0,0.5), 0 0 40px rgba(59, 130, 246, 0.2); }
      }
      @keyframes selection-highlight {
        0% { 
          box-shadow: 0 0 0px rgba(59, 130, 246, 0);
          transform: scale(1);
        }
        30% {
          box-shadow: 0 0 60px rgba(59, 130, 246, 0.7), 0 0 20px rgba(59, 130, 246, 0.3);
          transform: scale(1.1);
          border-color: #3b82f6;
        }
        100% {
          box-shadow: 0 0 30px rgba(59, 130, 246, 0.4), 0 0 10px rgba(59, 130, 246, 0.1);
          transform: scale(1.06);
          border-color: #3b82f6;
        }
      }
      @keyframes card-fade-in {
        from { opacity: 0; transform: translateY(5px) scale(0.99); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes tech-scan {
        0% { transform: translateY(-100%); opacity: 0; }
        50% { opacity: 1; }
        100% { transform: translateY(100%); opacity: 0; }
      }
      @keyframes scanner-line {
        0% { transform: translateY(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(300px); opacity: 0; }
      }
      
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
        20%, 40%, 60%, 80% { transform: translateX(4px); }
      }
      
      .animate-status-blue { animation: status-pulse-blue 2s ease-in-out infinite; }
      .animate-shake { animation: shake 0.6s cubic-bezier(.36,.07,.19,.97) both; }
      .animate-status-amber { animation: status-pulse-amber 3s ease-in-out infinite; }
      .animate-stale-pulse { animation: stale-pulse 3s ease-in-out infinite; }
      .animate-status-green { animation: status-pulse-green 2.5s ease-in-out infinite; }
      .animate-status-red { animation: status-pulse-red 1.5s ease-in-out infinite; }
      .animate-soft-float { animation: soft-float 5s ease-in-out infinite; }
      .animate-pulse-subtle { animation: pulse-subtle 4s ease-in-out infinite; }
      .animate-critical-pulse { animation: critical-pulse 2.5s infinite ease-in-out; }
      .animate-ready-pulse { animation: ready-pulse 2s infinite ease-in-out; }
      .animate-selected-fluid { 
        animation: selected-fluid 2s infinite ease-in-out; 
        border-width: 3px !important;
        position: relative;
        z-index: 50;
      }
      .animate-selection-highlight { 
        animation: selection-highlight 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        z-index: 100 !important;
        border-width: 3px !important;
      }
      .animate-form-glow { animation: form-glow 4s ease-in-out infinite; }
      .animate-card-fade-in {
        animation: card-fade-in 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }
      .animate-spin-slow {
        animation: spin-slow 8s linear infinite;
      }
      .animate-tech-scan {
        animation: tech-scan 3s linear infinite;
      }
      .animate-scanner-line {
        animation: scanner-line 3s linear infinite;
      }

      .custom-scrollbar::-webkit-scrollbar {
        height: 8px;
        width: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.05);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: content-box;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
        background-clip: content-box;
      }

      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: -0.02em;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
        color: #f97316;
      }
      .markdown-body p {
        margin-bottom: 1rem;
      }
      .markdown-body ul, .markdown-body ol {
        margin-bottom: 1rem;
        padding-left: 1.5rem;
      }
      .markdown-body li {
        margin-bottom: 0.5rem;
      }
      .markdown-body strong {
        font-weight: 900;
        color: #f97316;
      }

      .bg-grid-tech {
        background-size: 40px 40px;
        background-image: radial-gradient(circle, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
      }

      @media print {
        .print\:hidden, .no-print { display: none !important; }
        .print\:overflow-visible { overflow: visible !important; }
        .print\:h-auto { height: auto !important; }
        .print\:p-0 { padding: 0 !important; }
        .print\:mb-8 { margin-bottom: 2rem !important; }
        
        body, html { 
          background: white !important; 
          color: black !important;
          print-color-adjust: exact;
          -webkit-print-color-adjust: exact;
          height: auto !important;
          overflow: visible !important;
        }
        
        h2, h3, h4, span, p { color: black !important; }
        
        .bg-white, .bg-slate-50, .bg-[#07080C], .bg-[#12141C], .bg-[#0A0B10] { 
          background: white !important; 
          border-color: #eee !important;
        }
        
        .shadow-sm, .shadow-md, .shadow-lg, .shadow-xl, .shadow-2xl {
          box-shadow: none !important;
        }
        
        canvas {
          max-width: 100% !important;
          height: auto !important;
        }
        
        .recharts-responsive-container {
          width: 100% !important;
          height: 300px !important;
        }

        /* Hide interactives in print */
        button, .cursor-pointer, .no-print {
          display: none !important;
        }
        
        /* Ensure grids don't break in weird ways */
        .grid {
          display: block !important;
        }
        .grid > div {
          margin-bottom: 20px !important;
          page-break-inside: avoid !important;
        }
        
        /* Specific Fixes for Charts in Print */
        .recharts-surface {
          overflow: visible !important;
        }
      }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/": "https://esm.sh/react@18.3.1/",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/": "https://esm.sh/react-dom@18.3.1/",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
    "date-fns": "https://esm.sh/date-fns@4.1.0",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "date-fns/": "https://esm.sh/date-fns@^4.1.0/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden selection:bg-blue-100">

<script type="module" src="/index.tsx"></script>
</body>
</html>
